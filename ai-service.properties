spring.mongodb.uri=mongodb://localhost:27017/aidb
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:2020/eureka
spring.kafka.consumer.group-id="activity-consumer-group"
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.fitness.ai_service.events.ActivityEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.ai.google.genai.chat.model=gemini-3.5-flash
server.port=2023
